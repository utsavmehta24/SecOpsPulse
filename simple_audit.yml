---
- name: Simple Security Audit
  hosts: target_hosts
  gather_facts: yes
  
  tasks:
    - name: Show system information
      debug:
        msg: 
          - "Hostname: {{ ansible_hostname }}"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Kernel: {{ ansible_kernel }}"
          - "Architecture: {{ ansible_architecture }}"
          - "CPU Cores: {{ ansible_processor_vcpus }}"
          - "Memory: {{ ansible_memtotal_mb }}MB total"
          
    - name: Check open ports
      shell: ss -tuln
      register: open_ports
      changed_when: false
      
    - name: Display network information
      debug:
        msg: "{{ open_ports.stdout_lines[:10] }}"
        
    - name: Create a simple HTML report
      copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head><title>SecOpsPulse Report</title></head>
          <body>
          <h1>SecOpsPulse Security Report</h1>
          <p>Generated: {{ ansible_date_time.iso8601 }}</p>
          <h2>System Information</h2>
          <ul>
          <li>Hostname: {{ ansible_hostname }}</li>
          <li>OS: {{ ansible_distribution }} {{ ansible_distribution_version }}</li>
          <li>Kernel: {{ ansible_kernel }}</li>
          <li>CPU Cores: {{ ansible_processor_vcpus }}</li>
          <li>Memory: {{ ansible_memtotal_mb }}MB</li>
          </ul>
          <h2>Network Status</h2>
          <pre>{{ open_ports.stdout }}</pre>
          </body>
          </html>
        dest: "/tmp/security_report.html"
        
    - name: Show report location
      debug:
        msg: "Security report saved to /tmp/security_report.html"