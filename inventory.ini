# SecOpsPulse local inventory.
# Targets the current Linux/WSL machine using Ansible's local connection.
# The playbook escalates with sudo because package installation and /var/www/html writes need root.
# Change this file when you want to audit remote hosts instead of localhost.
[target_hosts]
localhost ansible_connection=local

[target_hosts:vars]
ansible_python_interpreter=python3
ansible_become_method=sudo
