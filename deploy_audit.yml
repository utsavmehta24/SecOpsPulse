---
# SecOpsPulse deployment playbook.
# Installs the packages needed for local dashboard hosting and audit collection.
# Gathers host facts, package inventory, port data, and firewall status.
# Renders dashboard.html.j2 into /var/www/html/index.html and ensures Nginx is running.
- name: SecOpsPulse Security Audit Deployment
  hosts: target_hosts
  gather_facts: yes
  vars:
    dashboard_path: "/var/www/html"
    nginx_conf_path: "/etc/nginx/sites-available"
    
  tasks:
    - name: Install required packages (Debian/Ubuntu)
      apt:
        name:
          - nginx
          - curl
          - net-tools
          - iproute2
        state: present
        update_cache: no
      become: yes
      when: ansible_os_family == "Debian"
      tags: packages

    - name: Install required packages (RedHat/CentOS)
      yum:
        name:
          - nginx
          - curl
          - net-tools
          - iproute2
        state: present
        update_cache: no
      become: yes
      when: ansible_os_family == "RedHat"
      tags: packages

    - name: Check open ports
      shell: ss -tuln
      register: open_ports
      changed_when: false
      tags: audit

    - name: Check installed packages (Debian/Ubuntu)
      shell: dpkg -l
      register: installed_packages_deb
      when: ansible_os_family == "Debian"
      changed_when: false
      tags: audit

    - name: Check installed packages (RedHat/CentOS)
      shell: rpm -qa
      register: installed_packages_rpm
      when: ansible_os_family == "RedHat"
      changed_when: false
      tags: audit

    - name: Check firewall status (ufw)
      shell: ufw status
      register: firewall_status_ufw
      when: ansible_os_family == "Debian"
      changed_when: false
      failed_when: false
      tags: audit

    - name: Check firewall status (firewalld)
      shell: firewall-cmd --state
      register: firewall_status_firewalld
      when: ansible_os_family == "RedHat"
      changed_when: false
      failed_when: false
      tags: audit

    - name: Create web directory
      file:
        path: "{{ dashboard_path }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'
      become: yes
      tags: web

    - name: Remove default nginx page
      file:
        path: "{{ dashboard_path }}/index.nginx-debian.html"
        state: absent
      become: yes
      tags: web

    - name: Generate security dashboard
      template:
        src: dashboard.html.j2
        dest: "{{ dashboard_path }}/index.html"
        owner: www-data
        group: www-data
        mode: '0644'
      become: yes
      tags: web

    - name: Start and enable nginx
      systemd:
        name: nginx
        state: started
        enabled: yes
      become: yes
      tags: web

    - name: Ensure nginx is running
      systemd:
        name: nginx
        state: started
      become: yes
      tags: web
